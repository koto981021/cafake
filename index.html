<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cafake</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Noto Serif JP', serif;
      background: #F1F3CE;
      color: #00293C;
    }

    /* ヒーロー */
    .hero {
      position: relative;
      height: 70vh;
      background-image: url("https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb");
      background-size: cover;
      background-position: center;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
    }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
    }

    .hero-text h1 {
      font-size: 48px;
      margin: 0;
    }

    /* セクション */
    .section {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h2 {
      border-left: 8px solid #F62A00;
      padding-left: 10px;
      color: #1E656D;
    }

    /* グリッドメニュー */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .menu-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .menu-card:hover {
      transform: translateY(-5px);
    }

    .menu-title {
      font-weight: bold;
      margin-bottom: 10px;
      color: #F62A00;
    }

    /* アニメーション */
    .fade-left {
      opacity: 0;
      transform: translateX(-50px);
      transition: all 0.8s ease;
    }

    .fade-right {
      opacity: 0;
      transform: translateX(50px);
      transition: all 0.8s ease;
    }

    .show {
      opacity: 1;
      transform: translateX(0);
    }

    .drink-img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    /* 店舗情報 */
    .info {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-top: 40px;
      line-height: 1.8;
    }

    a {
      color: #F62A00;
      text-decoration: none;
    }

    /* スマホ */
    @media (max-width: 600px) {
      .hero {
        height: 50vh;
      }
      .hero-text h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <!-- ヒーロー -->
  <div class="hero">
    <div class="overlay"></div>
    <div class="hero-text">
      <h1>cafake</h1>
      <p>ちょっとだけ現実を忘れられる架空のカフェ</p>
    </div>
  </div>

  <!-- メニュー -->
  <div class="section">
    <h2>Menu</h2>

    <div class="menu-grid">

      <!-- コーヒー -->
      <div class="menu-card fade-left">
        <img class="drink-img" src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
        <div class="menu-title">Coffee</div>
        <p>コーヒー 400円</p>
        <p>コールドブリュー 450円</p>
        <p>カフェラテ 550円</p>
        <p>カフェモカ 650円</p>
      </div>

      <!-- ティー -->
      <div class="menu-card fade-right">
        <img class="drink-img" src="https://images.unsplash.com/photo-1498804103079-a6351b050096">
        <div class="menu-title">Tea</div>
        <p>セイロン 400円</p>
        <p>アールグレイ 400円</p>
        <p>抹茶ラテ 550円</p>
        <p>ティーソーダ 500円</p>
      </div>

      <!-- ケーキ -->
      <div class="menu-card fade-left">
        <img class="drink-img" src="https://images.unsplash.com/photo-1505253213348-cd54c8c3b6f6">
        <div class="menu-title">Cake</div>
        <p>チーズケーキ 700円</p>
        <p>ガトーショコラ 750円</p>
        <p>レモンタルト 720円</p>
      </div>

    </div>

    <!-- 店舗情報 -->
    <div class="info">
      <h2>Info</h2>
      <p>営業時間：7:00 - 19:00</p>
      <p>住所：東京都目黒区自由が丘1-○-○（徒歩3分）</p>
      <p>Instagram：<a href="https://instagram.com/kt___21" target="_blank">@kt___21</a></p>
    </div>

  </div>

  <!-- JS（スクロールでアニメーション） -->
  <script>
    const elements = document.querySelectorAll('.fade-left, .fade-right');

    window.addEventListener('scroll', () => {
      elements.forEach(el => {
        const position = el.getBoundingClientRect().top;
        const screen = window.innerHeight;

        if (position < screen - 100) {
          el.classList.add('show');
        }
      });
    });
  </script>

</body>
</html>
